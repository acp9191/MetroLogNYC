name: Release to TestFlight

on:
  push:
    branches: [main]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-release:
    runs-on: macos-26
    timeout-minutes: 20
    permissions:
      contents: write

    env:
      SCHEME: MetroLogNYC
      PROJECT: MetroLogNYC.xcodeproj
      ARCHIVE_PATH: build/MetroLogNYC.xcarchive
      EXPORT_OPTIONS_PATH: build/ExportOptions.plist

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install semantic-release
        run: npm ci

      - name: Cache DerivedData
        uses: actions/cache@v5
        with:
          path: ~/Library/Developer/Xcode/DerivedData
          key: deriveddata-${{ hashFiles('**/*.swift', '**/*.pbxproj') }}
          restore-keys: deriveddata-

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_26.4.app/Contents/Developer

      - name: Determine next version
        id: version
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Dry run to get the next version without publishing
          OUTPUT=$(npx semantic-release --dry-run --no-ci 2>&1) || true
          echo "$OUTPUT"

          # Extract the next version from dry run output
          NEXT_VERSION=$(echo "$OUTPUT" | sed -n 's/.*next release version is \([0-9]*\.[0-9]*\.[0-9]*\).*/\1/p' | tail -1)

          if [ -n "$NEXT_VERSION" ]; then
            echo "version=$NEXT_VERSION" >> "$GITHUB_OUTPUT"
            echo "has_version=true" >> "$GITHUB_OUTPUT"
            echo "Next version: $NEXT_VERSION"
          else
            echo "has_version=false" >> "$GITHUB_OUTPUT"
            echo "No release needed."
          fi

      - name: Bump version in project
        if: steps.version.outputs.has_version == 'true'
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          BUILD_NUMBER=${{ github.run_number }}

          sed -i '' "s/MARKETING_VERSION = .*;/MARKETING_VERSION = $VERSION;/" "$PROJECT/project.pbxproj"
          sed -i '' "s/CURRENT_PROJECT_VERSION = .*;/CURRENT_PROJECT_VERSION = $BUILD_NUMBER;/" "$PROJECT/project.pbxproj"

          echo "Set version to $VERSION ($BUILD_NUMBER)"

      - name: Install Apple certificate and provisioning profile
        if: steps.version.outputs.has_version == 'true'
        env:
          DISTRIBUTION_CERTIFICATE_BASE64: ${{ secrets.DISTRIBUTION_CERTIFICATE_BASE64 }}
          DISTRIBUTION_CERTIFICATE_PASSWORD: ${{ secrets.DISTRIBUTION_CERTIFICATE_PASSWORD }}
          PROVISIONING_PROFILE_BASE64: ${{ secrets.PROVISIONING_PROFILE_BASE64 }}
          KEYCHAIN_PASSWORD: ${{ github.run_id }}
        run: |
          # Create temporary keychain
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Import certificate
          CERT_PATH=$RUNNER_TEMP/certificate.p12
          echo -n "$DISTRIBUTION_CERTIFICATE_BASE64" | base64 --decode -o "$CERT_PATH"
          security import "$CERT_PATH" \
            -P "$DISTRIBUTION_CERTIFICATE_PASSWORD" \
            -A \
            -t cert \
            -f pkcs12 \
            -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain-db

          # Install provisioning profile
          PROFILE_PATH=$RUNNER_TEMP/profile.mobileprovision
          echo -n "$PROVISIONING_PROFILE_BASE64" | base64 --decode -o "$PROFILE_PATH"

          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          PROFILE_UUID=$(/usr/libexec/PlistBuddy -c "Print UUID" /dev/stdin <<< \
            $(security cms -D -i "$PROFILE_PATH"))
          cp "$PROFILE_PATH" ~/Library/MobileDevice/Provisioning\ Profiles/"$PROFILE_UUID".mobileprovision

      - name: Create export options plist
        if: steps.version.outputs.has_version == 'true'
        run: |
          mkdir -p build
          plutil -create xml1 "$EXPORT_OPTIONS_PATH"
          plutil -insert method -string "app-store-connect" "$EXPORT_OPTIONS_PATH"
          plutil -insert destination -string "upload" "$EXPORT_OPTIONS_PATH"
          plutil -insert signingStyle -string "manual" "$EXPORT_OPTIONS_PATH"
          plutil -insert provisioningProfiles -dictionary "$EXPORT_OPTIONS_PATH"
          plutil -insert provisioningProfiles.com\\.averypeterson\\.MetroLogNYC \
            -string "${{ secrets.PROVISIONING_PROFILE_NAME }}" "$EXPORT_OPTIONS_PATH"
          plutil -insert teamID \
            -string "${{ secrets.TEAM_ID }}" "$EXPORT_OPTIONS_PATH"

      - name: Build archive
        if: steps.version.outputs.has_version == 'true'
        run: |
          xcodebuild archive \
            -project "$PROJECT" \
            -scheme "$SCHEME" \
            -destination "generic/platform=iOS" \
            -archivePath "$ARCHIVE_PATH" \
            -jobs "$(sysctl -n hw.ncpu)" \
            -quiet \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="${{ secrets.CODE_SIGN_IDENTITY }}" \
            PROVISIONING_PROFILE_SPECIFIER="${{ secrets.PROVISIONING_PROFILE_NAME }}" \
            DEVELOPMENT_TEAM="${{ secrets.TEAM_ID }}" \
            DEBUG_INFORMATION_FORMAT=dwarf \
            COMPILER_INDEX_STORE_ENABLE=NO

      - name: Export and upload to TestFlight
        if: steps.version.outputs.has_version == 'true'
        env:
          APP_STORE_CONNECT_API_KEY: ${{ secrets.ASC_API_KEY }}
        run: |
          API_KEY_PATH=$RUNNER_TEMP/AuthKey_${{ secrets.ASC_KEY_ID }}.p8
          echo -n "$APP_STORE_CONNECT_API_KEY" > "$API_KEY_PATH"

          xcodebuild -exportArchive \
            -archivePath "$ARCHIVE_PATH" \
            -exportOptionsPlist "$EXPORT_OPTIONS_PATH" \
            -authenticationKeyPath "$API_KEY_PATH" \
            -authenticationKeyID "${{ secrets.ASC_KEY_ID }}" \
            -authenticationKeyIssuerID "${{ secrets.ASC_ISSUER_ID }}"

      - name: Create GitHub Release
        if: steps.version.outputs.has_version == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx semantic-release

      - name: Clean up keychain
        if: always()
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          if [ -f "$KEYCHAIN_PATH" ]; then
            security delete-keychain "$KEYCHAIN_PATH"
          fi
          rm -f $RUNNER_TEMP/AuthKey_*.p8
